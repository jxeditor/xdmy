# xdmy 前端应用 — 部署到 /etc/nginx/conf.d/xdmy.conf
# 不覆盖主 nginx.conf，与其他服务互相独立

server {
    listen       8888;
    listen       [::]:8888;
    server_name  _;

    location / {
        root        /opt/xdmy/web/;
        index       index.html index.htm;
        try_files   $uri $uri/ @router;
    }

    location @router {
        rewrite ^.*$ /index.html last;
    }

    error_page 404 /404.html;
    location = /40x.html {}

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {}
}
